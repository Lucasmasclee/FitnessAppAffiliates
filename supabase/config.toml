# Edge Function submit-affiliate: we validate the JWT ourselves (getClaims) in the function.
# If verify_jwt = true (default), the Supabase gateway checks the JWT and can return 401
# before the request reaches the function (e.g. "Missing authorization header").
# With verify_jwt = false the request always reaches the function; we then require a valid
# token (from header or body) and return 401 ourselves if invalid.
[functions.submit-affiliate]
verify_jwt = false

# Legacy: Branch webhook (only if you still use Branch).
[functions.branch-webhook]
verify_jwt = false

# Affiliate redirect links (/join1 etc.) are public; we count clicks and then redirect
# based on platform (iOS / Android / fallback) without Supabase JWT.
[functions.affiliate-redirect]
verify_jwt = false

# Affiliate download tracker is called from the Flutter app without Supabase JWT;
# it increments downloads (total + platform-specific).
[functions.affiliate-download]
verify_jwt = false

# Affiliate subscriptions worden rechtstreeks vanuit de app / backend aangeroepen
# (affiliate_code). JWT-validatie gebeurt dus niet via de Supabase-gateway.
[functions.affiliate-subscription]
verify_jwt = false

# Public availability check for affiliate codes (no JWT).
[functions.check-affiliate-code]
verify_jwt = false
